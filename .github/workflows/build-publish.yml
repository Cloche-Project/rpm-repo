name: Build and Publish RPMs

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Exact version to build (e.g. 0.8.1). Leave empty to auto-detect.'
        required: false
        default: ''
      force:
        description: 'Build even if version matches stored'
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.resolve.outputs.version }}
      should_build: ${{ steps.resolve.outputs.should_build }}

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and compare with stored
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(curl -sf \
              -H "Authorization: Bearer $GH_TOKEN" \
              https://api.github.com/repos/bazaar-org/bazaar/releases/latest \
              | jq -r '.tag_name' | sed 's/^v//')
            if [ -z "$VERSION" ]; then
              echo "Failed to fetch upstream version" >&2
              exit 1
            fi
          fi

          STORED=$(cat versions/bazaar 2>/dev/null || echo "")
          echo "Upstream: $VERSION  |  Stored: ${STORED:-<none>}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          if [ "$VERSION" != "$STORED" ] || [ "${{ inputs.force }}" = "true" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Already at $VERSION, nothing to do"
          fi

  build:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'

    strategy:
      fail-fast: false
      matrix:
        target:
          - name:     fedora-44
            distro:   fedora
            version:  "44"
            image:    fedora:44
            setup:    ""
            optional: false

          - name:     centos-stream-10
            distro:   centos-stream
            version:  "10"
            image:    quay.io/centos/centos:stream10
            setup: |
              dnf install -y 'dnf-command(config-manager)'
              dnf config-manager --enable crb
              dnf install -y epel-release
            optional: true

    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.target.image }}

    continue-on-error: ${{ matrix.target.optional }}

    steps:
      - uses: actions/checkout@v4

      - name: Distro-specific repo setup
        if: matrix.target.setup != ''
        run: ${{ matrix.target.setup }}

      - name: Install RPM build toolchain
        run: |
          dnf install -y \
            rpm-build rpmdevtools rpm-sign gnupg2 curl jq

      - name: Install BuildRequires from spec
        run: dnf builddep -y specs/bazaar.spec

      - name: Set up rpmbuild tree
        run: rpmdev-setuptree

      - name: Fetch source tarball
        run: |
          spectool -g -R \
            --define "version ${{ needs.check-version.outputs.version }}" \
            specs/bazaar.spec

      - name: Build binary RPM
        run: |
          rpmbuild -bb \
            --define "version ${{ needs.check-version.outputs.version }}" \
            --define "_smp_mflags -j$(nproc)" \
            specs/bazaar.spec

      - name: Collect built RPMs
        run: |
          mkdir -p /tmp/rpms
          find ~/rpmbuild/RPMS -name '*.rpm' -exec cp {} /tmp/rpms/ \;

      - name: Upload RPM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rpms-${{ matrix.target.name }}
          path: /tmp/rpms/*.rpm
          if-no-files-found: error

  sign-and-publish:
    needs: [check-version, build]
    if: always() && needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all RPM artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/all-rpms
          pattern: rpms-*

      - name: Check if any RPMs were downloaded
        run: |
          COUNT=$(find /tmp/all-rpms -name '*.rpm' 2>/dev/null | wc -l)
          if [ "$COUNT" -eq 0 ]; then
            echo "No RPMs built successfully, nothing to publish"
            exit 1
          fi
          echo "$COUNT RPM(s) ready to sign and publish"

      - name: Install signing and repo tools
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            gnupg rpm createrepo-c

      - name: Import GPG signing key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE:  ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          cat > ~/.rpmmacros << 'EOF'
          %_signature      gpg
          %_gpg_name       Cloche Signing Key
          %__gpg_sign_cmd  %{__gpg} gpg \
                             --batch --no-verbose --pinentry-mode loopback \
                             --passphrase-fd 3 \
                             -u "%{_gpg_name}" -sbo %{__signature_filename} \
                             --digest-algo sha256 %{__plaintext_filename}
          EOF

      - name: Sign all RPMs
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          find /tmp/all-rpms -name '*.rpm' | while read RPM; do
            echo "Signing: $RPM"
            echo "$GPG_PASSPHRASE" | rpmsign --addsign \
              --define "_gpg_name Cloche Signing Key" \
              "$RPM" 3<&0
          done

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Organise RPMs into repo tree
        run: |
          declare -A TARGET_PATHS
          TARGET_PATHS["rpms-fedora-44"]="cloche/44/x86_64"
          TARGET_PATHS["rpms-centos-stream-10"]="cloche-pro/10/x86_64"

          for ARTIFACT_DIR in /tmp/all-rpms/*/; do
            ARTIFACT_NAME=$(basename "$ARTIFACT_DIR")
            REPO_PATH="${TARGET_PATHS[$ARTIFACT_NAME]:-}"
            [ -z "$REPO_PATH" ] && continue
            DEST="gh-pages/$REPO_PATH"
            mkdir -p "$DEST"
            find "$ARTIFACT_DIR" -name '*.rpm' -exec cp -f {} "$DEST/" \;
          done

      - name: Regenerate repodata
        run: |
          for REPO_DIR in gh-pages/fedora gh-pages/centos-stream; do
            [ -d "$REPO_DIR" ] || continue
            find "$REPO_DIR" -mindepth 2 -maxdepth 2 -type d | while read ARCH_DIR; do
              createrepo_c --update --checksum sha256 "$ARCH_DIR"
            done
          done

      - name: Export public GPG key
        run: |
          gpg --armor --export "Cloche Signing Key" > gh-pages/RPM-GPG-KEY-cloche

      - name: Copy .repo files
        run: |
          cp cloche-fedora.repo gh-pages/cloche-fedora.repo
          cp cloche-centos.repo gh-pages/cloche-centos.repo

      - name: Commit and push gh-pages
        working-directory: gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "Nothing changed" && exit 0
          git commit -m "repo: publish bazaar ${{ needs.check-version.outputs.version }}"
          git push origin gh-pages

      - name: Bump version tracking file
        run: |
          echo "${{ needs.check-version.outputs.version }}" > versions/bazaar
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add versions/bazaar
          git commit -m "chore: track bazaar ${{ needs.check-version.outputs.version }}" || true
          git push origin main